<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cambiar contraseña — RestauranteGT</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #18191a;
      color: #e4e6eb;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #242526;
      border: 1px solid #3e4042;
      border-radius: 16px;
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 48px; margin-bottom: 20px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; color: #e4e6eb; }
    .subtitle { color: #b0b3b8; font-size: 15px; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: block;
      width: 100%;
      padding: 15px 24px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 12px;
      font-family: inherit;
    }
    .btn-primary { background: #2d88ff; color: #ffffff; }
    .btn-primary:hover { background: #1877f2; }
    .btn-primary:disabled { background: #3e4042; color: #b0b3b8; cursor: not-allowed; }
    .status { margin-top: 20px; font-size: 13px; color: #b0b3b8; line-height: 1.5; min-height: 20px; }
    .status.error { color: #f44336; }
    .badge {
      display: inline-block;
      background: #2d88ff22;
      color: #2d88ff;
      font-size: 12px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🔐</div>
    <div class="badge">Seguridad de cuenta</div>
    <h1>Cambiar contraseña</h1>
    <p class="subtitle" id="msg">
      Abre la app para crear tu nueva contraseña.
    </p>

    <button class="btn btn-primary" id="btnAbrir">
      📱 Abrir en la App
    </button>

    <div class="status" id="status"></div>
  </div>

  <script>
    // Supabase redirige con ?code=xxx o a veces con #access_token=xxx
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));

    const code = params.get('code');
    const accessToken = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');
    const type = params.get('type') || hashParams.get('type');

    // Construir el deep link según lo que venga
    function construirDeepLink() {
      if (code) {
        return 'restaurante-gt://reset-password?code=' + code;
      }
      if (accessToken) {
        return 'restaurante-gt://reset-password?access_token=' + accessToken
          + '&refresh_token=' + (refreshToken || '')
          + '&type=' + (type || 'recovery');
      }
      return null;
    }

    const deepLink = construirDeepLink();

    const btn = document.getElementById('btnAbrir');

    if (!deepLink) {
      document.getElementById('msg').textContent =
        'Este link no es válido o ya expiró. Solicita un nuevo correo de recuperación desde la app.';
      btn.disabled = true;
    } else {
      btn.addEventListener('click', function () {
        window.location.href = deepLink;
        setTimeout(function () {
          document.getElementById('status').textContent =
            'La app no se abrió. Asegúrate de tener RestauranteGT instalado e intenta de nuevo.';
        }, 2500);
      });
    }

  </script>
</body>
</html>
